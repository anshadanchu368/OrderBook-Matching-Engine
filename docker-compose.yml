services:
  go-worker:
    profiles:
      - go-workers
    build:
      context: ./go-worker
    container_name: lob-go-worker-0
    working_dir: /app
    volumes:
      - ./go-worker:/app
    command: go run .
    restart: unless-stopped
    environment:
      PARTITION_ID: 0
      PARTITION_COUNT: 3
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
      - rabbitmq

  go-worker-1:
    profiles:
      - go-workers
    build:
      context: ./go-worker
    container_name: lob-go-worker-1
    working_dir: /app
    volumes:
      - ./go-worker:/app
    command: go run .
    restart: unless-stopped
    environment:
      PARTITION_ID: 1
      PARTITION_COUNT: 3
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
      - rabbitmq

  go-worker-2:
    profiles:
      - go-workers
    build:
      context: ./go-worker
    container_name: lob-go-worker-2
    working_dir: /app
    volumes:
      - ./go-worker:/app
    command: go run .
    restart: unless-stopped
    environment:
      PARTITION_ID: 2
      PARTITION_COUNT: 3
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
      - rabbitmq

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lob-api-dev
    working_dir: /app
    volumes:
      - .:/app
      - lob_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    command: npm run start:api
    environment:
      NODE_ENV: development
      PARTITION_COUNT: 3
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
      - rabbitmq

  matching-worker-0:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lob-matching-worker-0
    working_dir: /app
    volumes:
      - .:/app
      - lob_node_modules:/app/node_modules
    command: npm run start:worker
    environment:
      NODE_ENV: development
      PARTITION_ID: 0
      PARTITION_COUNT: 3
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
      - rabbitmq

  matching-worker-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lob-matching-worker-1
    working_dir: /app
    volumes:
      - .:/app
      - lob_node_modules:/app/node_modules
    command: npm run start:worker
    environment:
      NODE_ENV: development
      PARTITION_ID: 1
      PARTITION_COUNT: 3
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
      - rabbitmq

  matching-worker-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lob-matching-worker-2
    working_dir: /app
    volumes:
      - .:/app
      - lob_node_modules:/app/node_modules
    command: npm run start:worker
    environment:
      NODE_ENV: development
      PARTITION_ID: 2
      PARTITION_COUNT: 3
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
      - rabbitmq

  matching-standby-0:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lob-matching-standby-0
    working_dir: /app
    volumes:
      - .:/app
      - lob_node_modules:/app/node_modules
    command: npm run start:standby
    environment:
      NODE_ENV: development
      PARTITION_ID: 0
      PARTITION_COUNT: 3
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
      - rabbitmq

  matching-standby-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lob-matching-standby-1
    working_dir: /app
    volumes:
      - .:/app
      - lob_node_modules:/app/node_modules
    command: npm run start:standby
    environment:
      NODE_ENV: development
      PARTITION_ID: 1
      PARTITION_COUNT: 3
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
      - rabbitmq

  matching-standby-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lob-matching-standby-2
    working_dir: /app
    volumes:
      - .:/app
      - lob_node_modules:/app/node_modules
    command: npm run start:standby
    environment:
      NODE_ENV: development
      PARTITION_ID: 2
      PARTITION_COUNT: 3
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
      - rabbitmq

  websocket:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lob-websocket-dev
    working_dir: /app
    volumes:
      - .:/app
      - lob_node_modules:/app/node_modules
    ports:
      - "3001:3001"
    command: npm run start:websocket
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  rabbitmq:
    image: rabbitmq:3-management
    container_name: lob-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  redis:
    image: redis:7-alpine
    container_name: lob-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  lob_node_modules:
  rabbitmq_data:
  redis_data:
