services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lob-engine-dev
    working_dir: /app
    volumes:
      - .:/app
      - lob_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    command: npm run start
    environment:
      NODE_ENV: development

volumes:
  lob_node_modules: